<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; 
                   script-src 'self' 'unsafe-inline'; 
                   style-src 'self' 'unsafe-inline'; 
                   img-src 'self' data: https://picsum.photos;">
        <!-- Prevenir que el navegador adivine tipos de archivo -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    <!-- Evitar que la página se muestre en iframes (clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY">
    
    <!-- Controlar la información de referencia -->
    <meta name="referrer" content="strict-origin-when-cross-origin">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>D`talles Roxy</title>
     <!-- Favicon estándar -->
    <link rel="icon" type="image/x-icon" href="imagenes/logotipo1.png">
    <link rel="icon" type="image/png" sizes="32x32" href="imagenes/logotipo1.png">
    <link rel="icon" type="image/png" sizes="16x16" href="imagenes/logotipo1.png">
    
    <!-- Apple iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="imagenes/logotipo1.png">
    
    <!-- Android Chrome -->
    <link rel="manifest" href="imagenes/logotipo1.png">
    
    <!-- Windows -->
    <meta name="msapplication-TileColor" content="#e44d26">
    <meta name="theme-color" content="#e44d26">
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="pedido-header">
        <a href="index.html" class="btn-volver">← Volver a la tienda</a>
    </div>

    <div class="pedido-container">
        <h2>📋 Finalizar pedido</h2>
        <div id="resumen-carrito" class="resumen"></div>

        <!-- Mostrar código de pedido y fecha/hora -->
        <div class="info-pedido">
            <div><strong>Código de pedido:</strong> <span id="codigo-pedido"></span></div>
            <div><strong>Fecha y hora:</strong> <span id="fecha-hora"></span></div>
        </div>

        <form id="form-pedido">
            <div class="form-group">
                <label>Nombre completo :</label>
                <input type="text" id="nombre" required placeholder="Nombre y Apellidos...">
            </div>
            <div class="form-group">
                <label>Teléfono :</label>
                <input type="tel" id="telefono" required placeholder="+53 XXXXXXXX">
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="requiere-mensajeria">
                <label for="requiere-mensajeria">📦 Necesito mensajería / envío a domicilio</label>
            </div>
            <div id="direccion-group" class="oculto">
                <div class="form-group">
                    <label>Dirección (calle, número, entre calles, referencia)</label>
                    <textarea id="direccion" placeholder="Ej: Calle 23 #456 e/ 2 y 4, apto 3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group half">
                        <label>Provincia :</label>
                        <select id="provincia"></select>
                    </div>
                    <div class="form-group half">
                        <label>Municipio :</label>
                        <select id="municipio"></select>
                    </div>
                </div>
            </div>
            <button type="button" class="btn-whatsapp-final" id="btn-enviar-whatsapp">💬 Enviar pedido por WhatsApp</button>
        </form>
    </div>

    <script src="js/carrito.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/pedido.js"></script>
</body>
</html>
